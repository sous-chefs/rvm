---
driver:
  name: vagrant

provisioner:
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  install_strategy: once
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list: recipe[test::default]
    verifier:
      inspec_tests:
        - path: test/integration/default

  - name: system_install
    run_list: recipe[test::system_install]
    verifier:
      inspec_tests:
        - path: test/integration/default

  - name: user_install
    run_list: recipe[test::user_install]
    verifier:
      inspec_tests:
        - path: test/integration/user_install
