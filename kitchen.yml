---
driver:
  name: vagrant

provisioner:
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  install_strategy: once
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: debian-12
  - name: fedora-latest
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: system_install
    run_list: recipe[test::system_install]

  - name: user_install
    run_list: recipe[test::user_install]
